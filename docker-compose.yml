services:
  ragengine:
    build: .
    container_name: finiexragengine
    volumes:
      - .:/app
      # named volume for the root home — shell history, editor server state and
      # per-user tool config survive container rebuilds
      - devhome:/root
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://ragengine:ragengine@postgres:5432/ragengine
      # OPENAI_API_KEY is read from the local .env (never committed)
    env_file:
      - path: .env
        required: false
    depends_on:
      - postgres
    ports:
      - "8100:8100"
    stdin_open: true
    tty: true
    command: tail -f /dev/null

  postgres:
    # pgvector-enabled PostgreSQL — the vector store backing the RAG layer
    image: pgvector/pgvector:pg16
    container_name: finiexragengine-postgres
    environment:
      - POSTGRES_USER=ragengine
      - POSTGRES_PASSWORD=ragengine
      - POSTGRES_DB=ragengine
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    # Come back up automatically after a Docker/host restart (depends_on only orders start).
    restart: unless-stopped

  # Browser DB admin (dev only) — http://localhost:5050. Reaches postgres over the compose
  # network; the FiniexRAGEngine server is pre-registered via pgadmin_servers.json (enter the
  # DB password 'ragengine' on first connect).
  pgadmin:
    image: dpage/pgadmin4
    container_name: finiexragengine-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@local.dev
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_SERVER_JSON_FILE=/pgadmin4/servers.json
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./.devcontainer/pgadmin_servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  devhome:
  pgadmin_data:
